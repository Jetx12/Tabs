<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="container">

        <!-- TAB BUTTONS -->
        <div class="tabs">

            <button class="tab active" data-tab="tab1">
                First Tab
            </button>

            <button class="tab" data-tab="tab2">
                Second Tab
            </button>

            <button class="tab" data-tab="tab3">
                Third Tab
            </button>

            <button class="tab" data-tab="tab4">
                Fourth Tab
            </button>

        </div>

        <!-- CONTENT -->
        <div class="content-box">

            <div class="tab-content active" id="tab1">
                <h2>First Tab</h2>
                <p>
                    This is the content of the first tab.
                </p>
            </div>

            <div class="tab-content" id="tab2">
                <h2>Second Tab</h2>
                <p>
                    blablablabalbalbalbalbalbla
                </p>
            </div>

            <div class="tab-content" id="tab3">
                <h2>Third Tab</h2>
                <p>
                    wowowowowowowoowowowowowow
                </p>
            </div>

            <div class="tab-content" id="tab4">
                <h2>Fourth Tab</h2>
                <p>
                    This is the content of the fourth tab.
                </p>
            </div>

        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
